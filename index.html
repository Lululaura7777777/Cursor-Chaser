<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cursor Chaser</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="stage">
    <div class="hint">Move your cursor. Try clicking the little friend.</div>

    <div id="buddy" class="buddy" aria-label="cursor chasing buddy" role="button" tabindex="0">
      <div class="face">
        <span class="eye left"></span>
        <span class="eye right"></span>
        <span class="mouth"></span>
      </div>
      <div class="blush blush-left"></div>
      <div class="blush blush-right"></div>
      <div class="zzz">zZ</div>
    </div>

    <div id="message" class="message">hi, lulu :)</div>
  </main>

  <script src="script.js"></script>
</body>
</html>
